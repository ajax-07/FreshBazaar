# application configuration

spring:
  application:
    name: identity-service-api

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/freshbazaar?currentSchema=identity_service_api
    username: freshbazaar_user
    password: fb8EHjuZU56aerFpPiDbpssWrd
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: identity_service_api
    default-schema: identity_service_api
    baseline-on-migrate: true
    validate-on-migrete: true


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# jwt configuration
security:
  jwt:
    secret: "eQjc15Nt2ho9F8HS1fv35pnhWov7e5Re8SV3LF4YySpl6te7oX4CVBcajE=="
    access-token-expiration: 900000      # 15 minutes in milliseconds
    refresh-token-expiration: 604800000  # 7 days in milliseconds

# Logging
logging:
  level:
    com.freshbazaar.identity: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
